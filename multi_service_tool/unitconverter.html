    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="auth-check.js"></script>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<header class="navbar">
    <div class="logo">MultiTools</div>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
    </button>
    <nav>
        <ul id="navMenu">
            <li><a href="index.html">Home</a></li>
            <li><a href="tools.html">Tools</a></li>

            <li><a href="contact.html">Contact</a></li>
        </ul>

<!-- ===== PAGE HEADER ===== -->
<section class="page-header">
    <h1>Unit Converter</h1>
    <p>Convert units of length, weight, temperature, area, volume, speed, and more.</p>
</section>

<!-- ===== UNIT CONVERTER ===== -->
<section class="unit-converter">
    <div class="unit-box">

        <label>Select Category</label>
        <select id="conversionType">
            <option value="length">Length / Distance</option>
            <option value="weight">Weight / Mass</option>
            <option value="temperature">Temperature</option>
            <option value="area">Area</option>
            <option value="volume">Volume</option>
            <option value="speed">Speed</option>
            <option value="time">Time</option>
            <option value="data">Digital Storage</option>
        </select>

        <label>Enter Value</label>
        <input type="number" id="inputValue" placeholder="Enter value" step="any">

        <label>From Unit</label>
        <select id="fromUnit"></select>

        <label>To Unit</label>
        <select id="toUnit"></select>

        <button onclick="convertUnit()" class="btn-primary">
            Convert
        </button>

        <div class="result">
            <p>Converted Value:</p>
            <h2 id="unitResult">0</h2>
        </div>

    </div>
</section>
