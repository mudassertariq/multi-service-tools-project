<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Web Tools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .login-box {
      background: #1e293b;
      padding: 30px;
      width: 100%;
      max-width: 420px;
      border-radius: 10px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    }
    .login-box h2 { text-align: center; margin-bottom: 20px; }
    .login-box input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: none;
      outline: none;
      box-sizing: border-box;
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: #38bdf8;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .login-box button:hover { background: #0ea5e9; }
    .login-box p { text-align: center; margin-top: 15px; font-size: 14px; }
    .login-box a { color: #38bdf8; text-decoration: none; }
    #alertMsg {
      display: none;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 14px;
      text-align: center;
    }
    #alertMsg.error   { background: rgba(255,100,100,0.2); color: #f87171; }
    #alertMsg.success { background: rgba(52,211,153,0.2);  color: #34d399; }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Login</h2>
    <div id="alertMsg"></div>
    <input type="email"    id="email"    placeholder="Email Address" required>
    <input type="password" id="password" placeholder="Password"      required>
    <button id="loginBtn" onclick="loginUser()">Login</button>
    <p>Don't have an account? <a href="register.html">Register</a></p>
  </div>

  <script>
    // ✅ SAHI URL — sirf ek baar folder name
    const API_URL = 'http://localhost/multi_service_tool/login.php';

    function showAlert(message, type = 'error') {
      const el = document.getElementById('alertMsg');
      el.textContent = message;
      el.className = type;
      el.style.display = 'block';
    }

    async function loginUser() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn      = document.getElementById('loginBtn');

      if (!email || !password) {
        showAlert('Email and password are required');
        return;
      }

      btn.textContent = 'Please wait...';
      btn.disabled    = true;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const result = await response.json();

        if (result.success) {
          localStorage.setItem('token', result.token);
          localStorage.setItem('user', JSON.stringify(result.user));
          showAlert('Login successful! Redirecting...', 'success');
          setTimeout(() => { window.location.href = 'index.html'; }, 1200);
        } else {
          showAlert(result.message);
        }

      } catch (error) {
        showAlert('Server connection failed. Please try again.');
      } finally {
        btn.textContent = 'Login';
        btn.disabled    = false;
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loginUser();
    });
  </script>

</body>
</html>
