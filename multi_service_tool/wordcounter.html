<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Word Counter | Multi-Service Web Tools Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="auth-check.js"></script>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<header class="navbar">
    <div class="logo">MultiTools</div>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
    </button>
    <nav>
        <ul id="navMenu">
            <li><a href="index.html">Home</a></li>
            <li><a href="tools.html">Tools</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<!-- ===== PAGE HEADER ===== -->
<section class="page-header">
    <h1>Word Counter / Text Analyzer</h1>
    <p>Analyze your text by counting words, characters, and sentences instantly.</p>
</section>

<!-- ===== WORD COUNTER TOOL ===== -->
<section class="word-counter">
    <div class="counter-box">

        <label>Enter Text</label>
        <textarea id="textInput" rows="8" placeholder="Type or paste your text here..."></textarea>

        <div class="counter-results">
            <div class="count-box">
                <h3 id="wordCount">0</h3>
                <p>Words</p>
            </div>
            <div class="count-box">
                <h3 id="charCount">0</h3>
                <p>Characters</p>
            </div>
            <div class="count-box">
                <h3 id="sentenceCount">0</h3>
                <p>Sentences</p>
            </div>
        </div>

        <button onclick="clearText()" class="btn-secondary">
            Clear Text
        </button>

    </div>
</section>

<!-- ===== FOOTER ===== -->
<footer class="footer">

<script src="wordcounter.js"></script>

</body>
