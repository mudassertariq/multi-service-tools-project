<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Random URL / Data Generator | Multi-Service Web Tools Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="auth-check.js"></script>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<header class="navbar">
    <div class="logo">MultiTools</div>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
    </button>
    <nav>
        <ul id="navMenu">
            <li><a href="index.html">Home</a></li>
            <li><a href="tools.html">Tools</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<!-- ===== PAGE HEADER ===== -->
<section class="page-header">
    <h1>Random URL / Data Generator</h1>
    <p>Generate random URLs, strings, or data instantly for testing or practice purposes.</p>
</section>

<!-- ===== RANDOM GENERATOR TOOL ===== -->
<section class="random-generator">
    <div class="random-box">

        <label>Select Type</label>
        <select id="dataType">
            <option value="url">Random URL</option>
            <option value="string">Random String</option>
            <option value="number">Random Number</option>
            <option value="uuid">UUID</option>
            <option value="password">Random Password</option>
            <option value="hex">Hex Color</option>
        </select>

        <label>Length / Range</label>
        <input type="number" id="dataLength" placeholder="Enter length / max number" value="16">

        <button onclick="generateData()" class="btn-primary">Generate</button>

        <label>Result</label>
        <textarea id="dataResult" rows="5" placeholder="Generated data appears here..." readonly></textarea>

        <button onclick="copyData()" class="btn-secondary">Copy to Clipboard</button>

    </div>
</section>

</body>
