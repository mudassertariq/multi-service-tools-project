<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | Web Tools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .register-box {
      background: #1e293b;
      padding: 30px;
      width: 100%;
      max-width: 420px;
      border-radius: 10px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    }

    .register-box h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .register-box input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: none;
      outline: none;
      box-sizing: border-box;
    }

    .register-box button {
      width: 100%;
      padding: 12px;
      background: #38bdf8;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .register-box button:hover { background: #0ea5e9; }

    .register-box p {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .register-box a { color: #38bdf8; text-decoration: none; }

    #alertMsg {
      display: none;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 14px;
      text-align: center;
    }
    #alertMsg.error   { background: rgba(255,100,100,0.2); color: #f87171; }
    #alertMsg.success { background: rgba(52,211,153,0.2);  color: #34d399; }
  </style>
</head>
<body>

  <div class="register-box">
    <h2>Create Account</h2>

    <div id="alertMsg"></div>

    <input type="text"     id="name"           placeholder="Full Name"        required>
    <input type="email"    id="email"          placeholder="Email Address"    required>
    <input type="password" id="password"       placeholder="Password"         required>
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

    <button id="registerBtn" onclick="registerUser()">Register</button>

    <p>Already have an account? <a href="login.html">Login</a></p>
  </div>

  <script>
    const API_URL = 'http://localhost/multi_service_tool/register.php';

    function showAlert(message, type = 'error') {
      const el = document.getElementById('alertMsg');
      el.textContent = message;
      el.className = type;
      el.style.display = 'block';
    }

    async function registerUser() {
      const name            = document.getElementById('name').value.trim();
      const email           = document.getElementById('email').value.trim();
      const password        = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      const btn             = document.getElementById('registerBtn');

      if (!name || !email || !password || !confirmPassword) {
        showAlert('All fields are required');
        return;
      }

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showAlert('Please enter a valid email address');
        return;
      }

      if (password.length < 6) {
        showAlert('Password must be at least 6 characters');
        return;
      }

      if (password !== confirmPassword) {
        showAlert('Passwords do not match');
        return;
      }

      btn.textContent = 'Please wait...';
      btn.disabled    = true;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const result = await response.json();

        if (result.success) {
          showAlert('Account created successfully! Redirecting...', 'success');
          setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        } else {
          showAlert(result.message);
        }

      } catch (error) {
        showAlert('Server connection failed. Please try again.');
      } finally {
        btn.textContent = 'Register';
        btn.disabled    = false;
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') registerUser();
    });
  </script>

</body>
</html>
